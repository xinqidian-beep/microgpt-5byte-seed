<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>microGPT v0.11 — 5-Byte Seed + Continuous Rhythm Engine</title>
<style>
  body { 
    font-family: system-ui, sans-serif; 
    max-width: 1100px; 
    margin: 30px auto; 
    line-height: 1.6; 
    background: #0a0a0a; 
    color: #ddd; 
  }
  h1, h2 { color: #0f0; }
  canvas { background: #111; border: 2px solid #0f0; display: block; margin: 15px 0; }
  .bytes { display: flex; gap: 12px; flex-wrap: wrap; }
  .byte { 
    width: 64px; height: 64px; 
    background: #111; border: 4px solid #0f0; 
    font-size: 32px; line-height: 64px; 
    text-align: center; cursor: pointer; 
    user-select: none;
  }
  .byte:hover { border-color: #0ff; box-shadow: 0 0 15px #0ff; }
  .controls button { 
    background: #0a0; color: #000; border: none; 
    padding: 12px 20px; margin: 8px 4px; 
    font-weight: bold; cursor: pointer; 
  }
  .controls button:hover { background: #0f0; }
  .log { 
    background: #111; padding: 15px; 
    height: 180px; overflow-y: auto; 
    font-family: monospace; white-space: pre-wrap; 
    border: 1px solid #0f0;
  }
  .stats { font-family: monospace; background: #111; padding: 10px; margin: 10px 0; }
</style>
</head>
<body>
<h1>microGPT v0.11 — 5-Byte Seed + Continuous Rhythm Engine</h1>
<p><strong>线虫级二元自锁早期测试 | 音频韵律先导 | Harness柔性自锁</strong></p>

<div class="stats" id="stats">
  Time: 0.00 | Spikes: 0 | Rate: 0.000 | eff_mem: 0.000 | mini_K: 0.050
</div>

<div class="bytes" id="bytes"></div>

<div class="controls">
  <button onclick="resetEngine()">Reset Engine</button>
  <button onclick="togglePause()">Pause / Resume</button>
  <button onclick="simulateAudioFeeding()">Simulate Audio-First Feeding</button>
  <button onclick="run1000Steps()">Run 1000 Steps</button>
</div>

<canvas id="raster" width="900" height="220"></canvas>
<canvas id="memCurve" width="900" height="180"></canvas>

<div class="log" id="log"></div>

<script>
// ==================== v0.10 Python 引擎完整JS移植 ====================
class Neuron {
  constructor(nid) {
    this.nid = nid;
    this.V = -55.0;
    this.last_update = 0;
    this.local_mem = 0.0;
    this.short_mem = 0.0;
    this.long_mem = 0.0;
    this.mini_K = 0.05;
    this.next_spike_time = 0.0;
  }
}

const N = 5;
let neurons = Array.from({length: N}, (_, i) => new Neuron(i));
let current_time = 0.0;
let spike_count = 0;
let isPaused = false;
let lastFrameTime = performance.now();
let eventQueue = []; // 简易优先队列 [{time, nid, stamp}]

let seed = new Uint8Array([0, 1, 0, 1, 0]); // 原5-Byte UI

function effective_mem(neuron) {
  return neuron.local_mem * 0.5 + neuron.short_mem * 0.35 + neuron.long_mem * 0.15;
}

function update_mini_K(neuron) {
  const em = effective_mem(neuron);
  neuron.mini_K = 0.05 + 0.02 * (em / (0.3 + em));
}

function predict_next_spike(neuron, t) {
  update_mini_K(neuron);
  let interval = 30.0 * (1.0 - neuron.mini_K * 1.5);
  let noise = (Math.random() - 0.5) * 6;
  return t + Math.max(interval, 8.0) + noise;
}

// 初始化事件队列（继承v0.4启动钥匙）
function initEngine() {
  neurons.forEach(n => {
    n.V = -50.0;
    n.local_mem = 0.1;
    n.last_update = 1;
    const t = predict_next_spike(n, current_time);
    eventQueue.push({time: t, nid: n.nid, stamp: n.last_update});
  });
  // 简易排序
  eventQueue.sort((a,b) => a.time - b.time);
}

function processNextEvent() {
  if (eventQueue.length === 0 || isPaused) return;

  const event = eventQueue.shift();
  if (event.time > current_time + 300) return; // 远期过滤
  if (event.stamp !== neurons[event.nid].last_update) return;

  current_time = Math.max(current_time, event.time);

  const neuron = neurons[event.nid];
  neuron.V = -60.0;
  neuron.last_update++;

  spike_count++;

  // 记忆强化（方向3）
  neuron.local_mem += 0.20;
  neuron.short_mem += 0.15;
  neuron.long_mem += 0.08;

  // decay清理（熵管理）
  neuron.local_mem = Math.min(1.0, neuron.local_mem * 0.99);
  neuron.short_mem = Math.min(1.0, neuron.short_mem * 0.995);
  neuron.long_mem = Math.min(1.0, neuron.long_mem * 0.999);

  // 预测下一个
  const next_t = predict_next_spike(neuron, current_time);
  if (next_t < current_time + 200) {
    eventQueue.push({time: next_t, nid: neuron.nid, stamp: neuron.last_update});
    eventQueue.sort((a,b) => a.time - b.time); // 简易维护
  }

  // 5-byte UI 联动（扰动注入）
  if (Math.random() < 0.3) {
    seed[event.nid % 5] = 1 - seed[event.nid % 5];
  }
}

// ==================== 可视化 & UI ====================
const rasterCanvas = document.getElementById('raster');
const memCanvas = document.getElementById('memCurve');
const rasterCtx = rasterCanvas.getContext('2d');
const memCtx = memCanvas.getContext('2d');

let spikeHistory = []; // [[time, nid], ...] for raster

function drawRaster() {
  rasterCtx.fillStyle = '#111';
  rasterCtx.fillRect(0, 0, rasterCanvas.width, rasterCanvas.height);
  rasterCtx.strokeStyle = '#0f0';
  rasterCtx.lineWidth = 2;

  const visible = spikeHistory.slice(-300); // 最近300 spikes
  const tMin = visible.length ? visible[0][0] : 0;
  const tMax = current_time || 1;

  visible.forEach(([t, nid]) => {
    const x = ((t - tMin) / (tMax - tMin + 1)) * rasterCanvas.width;
    const y = (nid + 0.5) * (rasterCanvas.height / N);
    rasterCtx.beginPath();
    rasterCtx.moveTo(x, y - 12);
    rasterCtx.lineTo(x, y + 12);
    rasterCtx.stroke();
  });
}

function drawMemCurve() {
  memCtx.fillStyle = '#111';
  memCtx.fillRect(0, 0, memCanvas.width, memCanvas.height);
  
  const ems = neurons.map(n => effective_mem(n));
  const avgEm = ems.reduce((a,b)=>a+b,0)/N;
  
  memCtx.strokeStyle = '#0ff';
  memCtx.lineWidth = 3;
  memCtx.beginPath();
  memCtx.moveTo(0, memCanvas.height * (1 - avgEm));
  // 简化曲线：仅显示当前平均
  memCtx.lineTo(memCanvas.width, memCanvas.height * (1 - avgEm));
  memCtx.stroke();

  // 标签
  memCtx.fillStyle = '#0f0';
  memCtx.font = '12px monospace';
  memCtx.fillText(`eff_mem → ${avgEm.toFixed(4)} (锁定趋势)`, 20, 25);
}

function updateStats() {
  const avgEm = neurons.reduce((sum, n) => sum + effective_mem(n), 0) / N;
  const rate = current_time > 0 ? (spike_count / current_time).toFixed(4) : 0;
  document.getElementById('stats').textContent = 
    `Time: ${current_time.toFixed(1)} | Spikes: ${spike_count} | Rate: ${rate} | eff_mem: ${avgEm.toFixed(4)} | mini_K: ${neurons[0].mini_K.toFixed(4)}`;
}

function renderBytes() {
  const container = document.getElementById('bytes');
  container.innerHTML = '';
  seed.forEach((byte, i) => {
    const div = document.createElement('div');
    div.className = 'byte';
    div.textContent = byte;
    div.onclick = () => {
      seed[i] = 1 - seed[i];
      // 扰动注入到对应neuron
      if (i < N) neurons[i].local_mem = Math.min(1.0, neurons[i].local_mem + 0.25);
      log(`Byte ${i} flipped → ${seed[i]} (local_mem boosted)`);
      renderBytes();
    };
    container.appendChild(div);
  });
}

function log(msg) {
  const logEl = document.getElementById('log');
  logEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

// ==================== 控制函数 ====================
function gameLoop() {
  const now = performance.now();
  if (!isPaused && now - lastFrameTime > 16) { // ~60fps
    for (let i = 0; i < 3; i++) { // 每帧处理多步加速
      processNextEvent();
    }
    lastFrameTime = now;

    // 记录spike用于raster
    if (Math.random() < 0.2) {
      spikeHistory.push([current_time, Math.floor(Math.random()*N)]);
      if (spikeHistory.length > 800) spikeHistory.shift();
    }

    drawRaster();
    drawMemCurve();
    updateStats();
    renderBytes();
  }
  requestAnimationFrame(gameLoop);
}

function togglePause() {
  isPaused = !isPaused;
  log(isPaused ? "Engine Paused" : "Engine Resumed");
}

function resetEngine() {
  neurons = Array.from({length: N}, (_, i) => new Neuron(i));
  current_time = 0.0;
  spike_count = 0;
  eventQueue = [];
  spikeHistory = [];
  seed = new Uint8Array([0, 1, 0, 1, 0]);
  initEngine();
  log("Engine Reset to v0.11 initial state");
  renderBytes();
}

function simulateAudioFeeding() {
  log("=== Simulate Audio-First Feeding (韵律注入) ===");
  for (let i = 0; i < N; i++) {
    neurons[i].local_mem = Math.min(1.0, neurons[i].local_mem + 0.35);
    neurons[i].short_mem = Math.min(1.0, neurons[i].short_mem + 0.25);
  }
  log("Audio rhythm boost applied → eff_mem rising faster");
}

function run1000Steps() {
  const startTime = current_time;
  for (let i = 0; i < 1000; i++) {
    processNextEvent();
  }
  log(`1000 steps executed. ΔTime: ${(current_time - startTime).toFixed(1)} | eff_mem trend: stable`);
}

// ==================== 启动 ====================
initEngine();
renderBytes();
log("microGPT v0.11 initialized — Continuous Rhythm Engine + 5-Byte UI");
log("Click bytes to perturb | Watch eff_mem → 1.0 and stable rate");

gameLoop();
</script>

<p style="margin-top:40px; font-size:0.85em; color:#555;">
Offline • Zero dependencies • v0.10 Python Engine Fully Ported to JS • Binary Self-Locking + Audio-First Rhythm • Harness柔性自锁已嵌入
</p>
</body>
</html>
